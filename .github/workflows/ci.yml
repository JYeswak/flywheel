name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-surface:
    name: Public Surface
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install linters
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck
          python3 -m pip install --user ruff
          npm install -g markdownlint-cli@0.43.0
          printf '%s/.local/bin\n' "$HOME" >>"$GITHUB_PATH"
          printf '%s/bin\n' "$(npm prefix -g)" >>"$GITHUB_PATH"

      - name: Contract tests
        run: |
          set -euo pipefail
          bash tests/public-top-level-files.sh
          bash tests/public-surface-gap-scanner.sh
          bash tests/changelog.sh
          bash tests/github-workflows.sh
          bash tests/naming-conventions.sh
          bash tests/context-routing-discipline.sh
          bash tests/agent-lane-probe.sh
          bash tests/isolated-agent-lane-smoke.sh
          bash tests/public-docs.sh
          bash tests/public-links.sh
          bash tests/website-static.sh
          bash tests/website-accessibility.sh
          bash tests/live-site-probe.sh
          bash tests/contact-routing.sh
          bash tests/upstream-substrate-adoption.sh
          bash tests/release-assets.sh
          bash tests/cutover-receipts.sh
          bash tests/external-review-gate.sh
          bash tests/public-user-journey-pack.sh
          bash tests/story-system-package.sh
          bash tests/zeststream-ui-package.sh
          bash tests/publication-goal-completion-audit.sh
          bash tests/publication-readiness.sh
          bash tests/true-publication-registry-validate.sh
          bash tests/preflight-fixtures.sh
          bash tests/journey-smoke.sh

      - name: Shell lint
        run: |
          set -euo pipefail
          shellcheck \
            install.sh \
            uninstall.sh \
            scripts/preflight.sh \
            scripts/local-actions-preflight.sh \
            scripts/journey-smoke.sh \
            scripts/agent-lane-probe.sh \
            scripts/isolated-agent-lane-smoke.sh \
            scripts/zs-frontend-quality-gate.sh \
            tests/installer-smoke.sh \
            tests/public-top-level-files.sh \
            tests/public-surface-gap-scanner.sh \
            tests/changelog.sh \
            tests/github-workflows.sh \
            tests/naming-conventions.sh \
            tests/context-routing-discipline.sh \
            tests/agent-lane-probe.sh \
            tests/isolated-agent-lane-smoke.sh \
            tests/public-docs.sh \
            tests/public-links.sh \
            tests/website-static.sh \
            tests/website-accessibility.sh \
            tests/live-site-probe.sh \
            tests/contact-routing.sh \
            tests/upstream-substrate-adoption.sh \
            tests/release-assets.sh \
            tests/cutover-receipts.sh \
            tests/external-review-gate.sh \
            tests/public-user-journey-pack.sh \
            tests/story-system-package.sh \
            tests/zeststream-ui-package.sh \
            tests/publication-goal-completion-audit.sh \
            tests/publication-readiness.sh \
            tests/true-publication-registry-validate.sh \
            tests/preflight-fixtures.sh

      - name: Python syntax lint
        run: |
          set -euo pipefail
          ruff check \
            --select E9,F63,F7,F82 \
            scripts/assemble.py \
            scripts/classify.py \
            scripts/depersonalize.py \
            scripts/review_queue.py \
            scripts/validate_external_review.py \
            scripts/website_accessibility.py \
            scripts/live_site_probe.py \
            scripts/check_links.py \
            scripts/contact_route_probe.py \
            scripts/publication_readiness.py \
            scripts/validate_cutover_receipts.py \
            scripts/validate_user_journey_pack.py \
            scripts/validate_story_system_package.py

      - name: Markdown lint
        run: |
          set -euo pipefail
          markdownlint \
            --disable MD013 \
            -- \
            README.md \
            CHARTER.md \
            CONTRIBUTING.md \
            SECURITY.md \
            SUPPORT.md \
            CODE_OF_CONDUCT.md \
            CHANGELOG.md \
            ARCHITECTURE.md \
            docs/getting-started/first-run.md \
            docs/runbooks/public-release-runbook.md \
            docs/runbooks/release-cutover-authorization.md \
            docs/runbooks/context-and-model-routing.md \
            docs/runbooks/local-actions-preflight.md \
            docs/runbooks/isolated-agent-lane-testing.md \
            docs/runbooks/agent-lane-compatibility.md \
            docs/runbooks/upstream-substrate-adoption.md \
            docs/runbooks/public-user-journey-pack.md \
            docs/runbooks/public-site-smb-journey-wireframe.md \
            docs/stories/public-journey-and-redaction.md \
            packages/zeststream-story-system/README.md \
            packages/zeststream-ui/README.md \
            docs/evidence/publication-evidence.md \
            docs/evidence/publication-goal-completion-audit.md \
            docs/concepts/*.md \
            docs/reference/*.md
