name: Site Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose install assets should be served, for example v0.2.0"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: release
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            git rev-parse --verify "refs/tags/$tag" >/dev/null
          else
            tag="${GITHUB_REF_NAME}"
          fi
          git checkout --detach "$tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

      - name: Validate site source
        run: |
          set -euo pipefail
          bash tests/website-static.sh
          bash tests/story-system-package.sh
          python3 scripts/depersonalize.py --scan-table --root site --json

      - name: Build site artifact
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          mkdir -p site-dist
          cp -R site/. site-dist/
          cp install.sh site-dist/install.sh
          (
            cd site-dist
            shasum -a 256 install.sh >install.sh.sha256
          )
          printf 'flywheel.zeststream.ai\n' >site-dist/CNAME
          install_sha="$(awk '{print $1}' site-dist/install.sh.sha256)"
          printf '{"schema_version":"flywheel.site_deploy_manifest.v0","tag":"%s","install_sha256":"%s"}\n' \
            "$tag" "$install_sha" >site-dist/site-deploy-manifest.json

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: site-dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
