name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package, for example v0.2.1"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package Release
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck

      - name: Resolve tag
        id: release
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            git rev-parse --verify "refs/tags/$tag" >/dev/null
          else
            tag="${GITHUB_REF_NAME}"
          fi
          git checkout --detach "$tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

      - name: Validate before packaging
        run: |
          set -euo pipefail
          bash tests/public-top-level-files.sh
          bash tests/public-surface-gap-scanner.sh
          bash tests/changelog.sh
          bash tests/github-workflows.sh
          bash tests/naming-conventions.sh
          bash tests/public-docs.sh
          bash tests/public-links.sh
          bash tests/website-static.sh
          bash tests/website-accessibility.sh
          bash tests/story-system-package.sh
          bash tests/release-assets.sh
          bash tests/cutover-receipts.sh
          bash tests/installer-smoke.sh
          python3 scripts/validate_external_review.py --log docs/evidence/external-review-log.jsonl --release --json

      - name: Build release assets
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          mkdir -p dist
          cp install.sh dist/install.sh
          git archive --format=tar.gz --output "dist/flywheel-${tag}.tar.gz" "$tag"
          (
            cd dist
            shasum -a 256 install.sh >install.sh.sha256
            shasum -a 256 "flywheel-${tag}.tar.gz" >"flywheel-${tag}.tar.gz.sha256"
            shasum -a 256 install.sh "flywheel-${tag}.tar.gz" >SHA256SUMS
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --generate-notes
          fi
