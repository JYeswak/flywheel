# Canonical @zeststream/security-hygiene .gitleaks.toml — TWO-LAYER + substrate-class
#
# Hardened via 4 independent ratifications:
#   - josh-ops (htv0d / commit 6bd3423)        — MISSING-COVERAGE-FILTERING
#   - terratitle (k8o1c / commit 2400422)      — MISCONFIGURATION-SURFACING
#   - alpsinsurance (1hn11 / commit 5bcbeabc)  — REFINEMENT-NOT-SURFACING
#   - flywheel:1 (2026-05-12)                  — SUBSTRATE-CLASS-MANIFEST INTEGRATION
#
# This is the canonical TWO-LAYER-GITLEAKS-ALLOWLIST pattern with the
# substrate-class paradigm overlay (L162). Allowlists mirror declarations in
# `.flywheel/security/v1/substrate-class-manifest.json` so the gitleaks config
# and the substrate-class classifier stay in sync.
#
# Maintenance protocol:
#   1. Add NEW custom-rule blocks when a new internal-prefix family is
#      introduced (ALPS pattern; see alps-db-password-assignment below).
#   2. Add path-allowlist entries for any directory containing
#      intentional example/test/research/doc payloads.
#   3. Add regex-allowlist entries for documented placeholder patterns.
#   4. Add stopwords for repeatedly-flagged false-positive literals.
#   5. Re-run `gitleaks detect` after each change; verify zero NEW
#      surfaced secrets are real (not just false-positives moved).
#   6. When substrate-class manifest gains new protection/audit-ledger paths,
#      mirror them into the path-allowlist here.

title = "flywheel gitleaks config — canonical TWO-LAYER + substrate-class overlay"

# Layer 0: extend the default v8 rule set. THIS LINE IS LOAD-BEARING —
# without it, gitleaks silently disables all default rules and the
# scan returns false-CLEAN. The terratitle ratification (k8o1c)
# surfaced 2 previously-invisible secrets when this line was added.
[extend]
useDefault = true

# Optional: custom rules layer (ALPS pattern). Use when a repo-specific
# secret shape is not caught by default rules.
#
# [[rules]]
# id = "{{REPO}}-db-password-assignment"
# description = "Detect committed DB_PASSWORD assignments"
# regex = '''(?i)\bDB_PASSWORD\s*=\s*['"]?([^\s'"]{12,})['"]?'''
# secretGroup = 1
# keywords = ["DB_PASSWORD"]

[allowlist]
description = """
Path + regex + stopwords allowlists for documented placeholder content.
External vendor prefixes (sk-ant-*, sk-proj-*, xai-*, AKIA*, ghp_*, etc.)
are NOT allowlisted — default gitleaks rules continue to catch them.

Substrate-class paradigm (L162): protection-class + audit-ledger-class +
test-fixture-class paths are explicitly allowlisted here because their
content includes intentional shape-matches (detector corpora, historical
trauma records, synthetic test fixtures).
"""

# Layer 1: path-allowlist. The union of josh-ops + terratitle + ALPS
# path-allowlists, plus substrate-class manifest paths.
paths = [
    # Example/template files (canonical across all 3 ratifications).
    '''\.env\.example''',
    '''\.env\.local\.example''',
    '''.*\.env.*\.example$''',
    '''.*\.example\..*''',

    # Tests (backend AND frontend; ALPS+terratitle convention).
    '''(^|/)tests/.*''',
    '''(^|/)backend/tests/.*''',
    '''(^|/)frontend/tests/.*''',
    '''.*test.*\.(py|sh|js|ts|md)''',
    '''(^|/)\.flywheel/tests/.*''',

    # Planning + research + doctrine (terratitle + josh-ops convention).
    '''PLAN-.*\.md''',
    '''.*PLAN\.md''',
    '''\.planning/.*\.md''',
    '''\.flywheel/doctrine/.*\.md''',
    '''\.flywheel/PLANS/.*''',
    '''\.flywheel/plans/.*''',
    '''\.RESEARCH_OUTPUT/.*''',
    '''\.flywheel/research/.*''',

    # Docs + README + quickstart (canonical).
    '''docs/.*\.md''',
    '''README\.md''',
    '''.*README\.md''',
    '''QUICKSTART.*\.(md|sh)''',
    '''CHANGELOG\.md''',

    # Reference-pattern code from other projects (ALPS convention).
    '''(^|/)reference-patterns/''',

    # Backup files.
    '''.*\.bak\..*''',

    # CI workflows use fake env values (ALPS convention).
    '''(^|/)\.github/workflows/.*\.ya?ml$''',
    '''(^|/)\.gitea/workflows/.*\.ya?ml$''',

    # Generated/derived files (ALPS convention).
    '''(^|/)\.beads/''',
    '''(^|/)backend/\.beads/''',
    '''(^|/)\.ecosystem/''',
    '''(^|/)backend/\.venv/''',
    '''(^|/)node_modules/''',
    '''(^|/)__pycache__/''',

    # --- Substrate-class paradigm (L162) additions ---
    # audit-ledger: append-only forensic records of past incidents
    # (may contain redacted token references in trauma documentation).
    '''(^|/)\.flywheel/audit/.*''',
    '''(^|/)\.flywheel/evidence/.*''',
    '''(^|/)\.flywheel/receipts/.*''',
    '''(^|/)\.flywheel/handoffs/.*''',
    '''(^|/)\.flywheel/dispatch-log\.jsonl$''',
    '''(^|/)\.flywheel/lock-log\.jsonl$''',
    '''(^|/)\.flywheel/rollback-receipts\.jsonl$''',
    '''(^|/)\.flywheel/callback-validation-log\.jsonl$''',
    '''(^|/)\.flywheel/cd-realpath-wrapper-log\.jsonl$''',
    '''(^|/)\.flywheel/peer-orch-recovery-contract\.jsonl$''',
    '''(^|/)\.flywheel/validation-learn-ledger\.jsonl$''',
    '''(^|/)\.flywheel/validation-receipts/.*''',
    '''(^|/)\.flywheel/skillos-requests/.*''',
    '''(^|/)\.flywheel/checkpoints/.*''',
    '''(^|/)\.flywheel/prompts/.*''',
    '''(^|/)\.flywheel/reports/.*''',
    '''(^|/)\.flywheel/contracts/.*''',
    '''(^|/)\.flywheel/wire-or-explain/.*''',
    '''(^|/)\.flywheel/tick-contract-registry/.*''',

    # protection-class: detector configs + manifests themselves contain
    # shape-matches by design (stopwords IS the synthetic-sentinel set).
    '''(^|/)\.flywheel/security/v1/.*''',
    '''(^|/)\.flywheel/rules/.*''',
    '''(^|/)\.flywheel/AGENTS-CANONICAL\.md$''',
    '''(^|/)cross-orch-input/.*''',

    # Templates + install scaffolds (canonical synthesis artifacts).
    '''(^|/)templates/flywheel-install/.*''',
    '''(^|/)templates/.*''',
]

# Layer 2: regex-allowlist for documented internal-prefix families and
# placeholder patterns.
regexes = [
    # LAN-private LLM gateway family (Bifrost localhost:8991 + Langfuse
    # RFC1918 10.10.20.10:3200).
    '''sk-bf-[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}''',
    '''sk-lf-[a-f0-9-]+''',
    '''pk-lf-[a-f0-9-]+''',
    '''sk-bv-[a-f0-9-]+''',

    # Fixtures + placeholder syntax (ALPS pattern).
    '''pat-na1-0000''',
    '''test-secret-key''',
    '''test-[a-z0-9-]*secret[a-z0-9-]*''',
    '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}''',
    '''NEXT_PUBLIC_[A-Z0-9_]+''',
    '''SENTRY_AUTH_TOKEN''',
    '''<[^>\n]*(?:secret|token|key|password)[^>\n]*>''',
    '''eyJ[A-Za-z0-9_-]*\.\.\.''',
    '''your[-_][a-z0-9_-]*(?:secret|token|key|password)[a-z0-9_-]*''',

    # Substrate-class synthetic AKID sentinels (declared in manifest).
    '''AKIA0FAKE0FAKE0FAKE0''',
    '''AKIA1234567890ABCDEF''',
]

# Stopwords: canonical placeholder strings that should never be
# classified as secrets regardless of entropy.
stopwords = [
    "REPLACE_ME",
    "REDACTED",
    "PLACEHOLDER",
    "EXAMPLE_VALUE",
    "YOUR_KEY_HERE",
    "CHANGEME",
    "your-api-key-here",

    # Substrate-class synthetic markers (mirror manifest.synthetic_sentinels)
    "FAKE",
    "SYNTHETIC",
    "EXAMPLE_TOKEN",
    "fixture_secret",
    "_synthetic",
    "_good_envelope",
    "_test_fixture",
    "TEST_TOKEN_",
    "synthetic-key",
    "for unit test",
    "canonical-fake",
    "obvious-fake",

    # Canonical synthetic test fixtures (public documentation)
    "sk_test_4eC39HqLyjWDarjtT1zdp7dc",
]
