<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="limeGlow" cx="16%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#d4f34a" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#d4f34a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d4f34a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="86%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#1f9a9a" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#1f9a9a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1f9a9a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="baseBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101412"/>
      <stop offset="48%" stop-color="#17201b"/>
      <stop offset="100%" stop-color="#222819"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
