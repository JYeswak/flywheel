    </linearGradient>
    <mask id="gridMask">
      <rect width="1200" height="630" fill="url(#fadeMask)"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="url(#baseBg)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)" mask="url(#gridMask)"/>
  <rect width="1200" height="630" fill="url(#limeGlow)"/>
  <rect width="1200" height="630" fill="url(#tealGlow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
