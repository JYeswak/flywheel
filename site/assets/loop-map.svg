<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Flywheel operating loop</title>
  <desc id="desc">Disconnected business systems flow through agent work, doctor checks, receipts, and a next action.</desc>
  <rect width="960" height="540" fill="#f5f2ea"/>
  <rect x="60" y="66" width="840" height="408" rx="18" fill="#ffffff" stroke="#1d2528" stroke-width="3"/>
  <path d="M188 178h584M772 178v184H188V178" fill="none" stroke="#1d2528" stroke-width="5" stroke-linecap="round"/>
  <path d="M716 122l58 56-58 56M246 418l-58-56 58-56" fill="none" stroke="#1d2528" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#1d2528">
    <g>
      <rect x="104" y="128" width="168" height="100" rx="8" fill="#dbeafe" stroke="#1d2528" stroke-width="2"/>
      <text x="188" y="170" text-anchor="middle" font-size="24" font-weight="700">5 systems</text>
      <text x="188" y="202" text-anchor="middle" font-size="18">manual work</text>
    </g>
    <g>
      <rect x="328" y="128" width="168" height="100" rx="8" fill="#dcfce7" stroke="#1d2528" stroke-width="2"/>
      <text x="412" y="170" text-anchor="middle" font-size="24" font-weight="700">Agent work</text>
      <text x="412" y="202" text-anchor="middle" font-size="18">routed by fit</text>
    </g>
    <g>
      <rect x="552" y="128" width="168" height="100" rx="8" fill="#fef3c7" stroke="#1d2528" stroke-width="2"/>
      <text x="636" y="170" text-anchor="middle" font-size="24" font-weight="700">Doctors</text>
      <text x="636" y="202" text-anchor="middle" font-size="18">fail closed</text>
    </g>
    <g>
      <rect x="552" y="312" width="168" height="100" rx="8" fill="#fee2e2" stroke="#1d2528" stroke-width="2"/>
      <text x="636" y="354" text-anchor="middle" font-size="24" font-weight="700">Receipts</text>
      <text x="636" y="386" text-anchor="middle" font-size="18">auditable proof</text>
    </g>
    <g>
      <rect x="328" y="312" width="168" height="100" rx="8" fill="#ede9fe" stroke="#1d2528" stroke-width="2"/>
      <text x="412" y="354" text-anchor="middle" font-size="24" font-weight="700">Lessons</text>
      <text x="412" y="386" text-anchor="middle" font-size="18">locked in</text>
    </g>
    <g>
      <rect x="104" y="312" width="168" height="100" rx="8" fill="#e0f2fe" stroke="#1d2528" stroke-width="2"/>
      <text x="188" y="354" text-anchor="middle" font-size="24" font-weight="700">Next action</text>
      <text x="188" y="386" text-anchor="middle" font-size="18">visible loop</text>
    </g>
  </g>
</svg>
