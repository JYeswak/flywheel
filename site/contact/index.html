<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Flywheel | ZestStream</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <header class="topbar"><nav class="shell nav" aria-label="Main navigation"><a class="brand" href="../index.html">Flywheel</a><div class="links"><a href="../what-is/index.html">What Is It</a><a href="../for-developers/index.html">Developers</a><a href="../methodology/index.html">Methodology</a><a href="../about/index.html">About</a></div></nav></header>
    <main>
      <section class="hero">
        <div class="shell">
          <div class="eyebrow">Public routing</div>
          <h1>Ask a Flywheel question.</h1>
          <p class="lead">Use the public address for install, support, method, or commercial questions. Do not include secrets, private logs, or client data.</p>
          <form action="mailto:joshua@zeststream.ai?subject=%5BFlywheel%5D%20Public%20site%20inquiry" method="post" enctype="text/plain">
            <label for="topic">Topic</label>
            <select id="topic" name="topic">
              <option>Install support</option>
              <option>Developer evaluation</option>
              <option>SMB consultation</option>
              <option>Method question</option>
            </select>
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Summarize the question and include only redacted evidence."></textarea>
            <div class="button-row">
              <button class="button" type="submit">Open email</button>
              <a class="button secondary" href="mailto:joshua@zeststream.ai?subject=%5BFlywheel%5D%20Public%20site%20inquiry">Email directly</a>
            </div>
          </form>
        </div>
      </section>
    </main>
    <footer class="footer"><div class="shell">Public questions route to <a href="mailto:joshua@zeststream.ai">joshua@zeststream.ai</a>.</div></footer>
  </body>
</html>
