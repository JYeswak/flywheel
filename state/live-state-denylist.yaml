    class: live-runtime-state
    pattern: ".ntm/**"
    decision: deny
    reason_code: private_pane_runtime
    public_replacement: "document NTM install and detection, not local runtime state"
    probe_fixture: fixtures/denylist/ntm-runtime-tree
