schema_version: flywheel.live_state_denylist.v0
rows:
  - id: repo-ntm-runtime
    class: live-runtime-state
    pattern: ".ntm/**"
    decision: deny
    reason_code: private_pane_runtime
    public_replacement: "document NTM install and detection, not local runtime state"
    probe_fixture: fixtures/denylist/ntm-runtime-tree
  - id: repo-flywheel-runtime
    class: live-runtime-state
    pattern: ".flywheel/runtime/**"
    decision: deny
    reason_code: private_flywheel_runtime
    public_replacement: "generate runtime directories during public init"
    probe_fixture: fixtures/denylist/flywheel-runtime-tree
  - id: repo-local-private-receipts
    class: live-runtime-state
    pattern: ".flywheel/receipts/private/**"
    decision: deny
    reason_code: private_receipt_state
    public_replacement: "publish scrubbed example receipts only"
    probe_fixture: fixtures/denylist/private-receipts
